worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    add_header X-Frame-Options    "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                  always;
    add_header Referrer-Policy    "strict-origin-when-cross-origin" always;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name bethlem.co www.bethlem.co forum.bethlem.co;
        return 301 https://$host$request_uri;
    }

    # ── bethlem.co → Next.js ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name bethlem.co www.bethlem.co;

        ssl_certificate     /etc/letsencrypt/live/bethlem.co/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bethlem.co/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;

        # www → apex
        if ($host = 'www.bethlem.co') {
            return 301 https://bethlem.co$request_uri;
        }

        client_max_body_size 10m;

        # Route Supabase API calls through Kong (browser can't reach internal docker host)
        location /supabase/ {
            proxy_pass         http://supabase-kong:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Next.js static assets — aggressively cached (content-hashed filenames)
        location /_next/static/ {
            proxy_pass http://nextjs:3000;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass         http://nextjs:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── forum.bethlem.co → Discourse ────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name forum.bethlem.co;

        ssl_certificate     /etc/letsencrypt/live/forum.bethlem.co/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/forum.bethlem.co/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;

        client_max_body_size 50m;  # Discourse needs this for file uploads

        location / {
            proxy_pass         http://discourse:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;  # Discourse SSE / long-poll connections
        }
    }
}
