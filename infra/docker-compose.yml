name: bethlem

networks:
  proxy:
    driver: bridge
  app:
    driver: bridge
    name: bethlem_app  # referenced as external in infra/supabase/docker-compose.yml
  discourse_internal:
    driver: bridge

volumes:
  discourse-data:
  discourse-postgres-data:
  discourse-redis-data:

services:

  # ── Nginx (reverse proxy) ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - proxy
    depends_on:
      - nextjs
      - discourse

  # ── Next.js (main site + SSO endpoint) ────────────────────────────────────
  nextjs:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      DISCOURSE_BASE_URL: ${DISCOURSE_BASE_URL}
      DISCOURSE_SSO_SECRET: ${DISCOURSE_SSO_SECRET}
    networks:
      - proxy
      - app
    depends_on:
      supabase-kong:
        condition: service_healthy

  # ── Discourse (forum) ──────────────────────────────────────────────────────
  discourse:
    image: bitnami/discourse:3
    restart: unless-stopped
    environment:
      DISCOURSE_HOSTNAME: forum.bethlem.co
      DISCOURSE_DATABASE_HOST: discourse-postgres
      DISCOURSE_DATABASE_PORT_NUMBER: "5432"
      DISCOURSE_DATABASE_NAME: discourse
      DISCOURSE_DATABASE_USER: discourse
      DISCOURSE_DATABASE_PASSWORD: ${DISCOURSE_DB_PASSWORD}
      DISCOURSE_REDIS_HOST: discourse-redis
      DISCOURSE_REDIS_PORT_NUMBER: "6379"
      DISCOURSE_SITE_TITLE: Bethlem Community
      DISCOURSE_USERNAME: ${DISCOURSE_ADMIN_USERNAME}
      DISCOURSE_PASSWORD: ${DISCOURSE_ADMIN_PASSWORD}
      DISCOURSE_EMAIL: ${DISCOURSE_ADMIN_EMAIL}
      # SMTP — for Discourse notification emails
      DISCOURSE_SMTP_HOST: ${SMTP_HOST}
      DISCOURSE_SMTP_PORT: ${SMTP_PORT}
      DISCOURSE_SMTP_USER: ${SMTP_USER}
      DISCOURSE_SMTP_PASSWORD: ${SMTP_PASSWORD}
      DISCOURSE_SMTP_PROTOCOL: tls
      # DiscourseConnect SSO — must match Next.js DISCOURSE_SSO_SECRET exactly
      DISCOURSE_ENABLE_SSO: "true"
      DISCOURSE_SSO_URL: ${NEXT_PUBLIC_SITE_URL}/api/auth/discourse-sso
      DISCOURSE_SSO_SECRET: ${DISCOURSE_SSO_SECRET}
      # Keep local logins ON until you have verified SSO works end-to-end,
      # then set to "false" and recreate the container.
      DISCOURSE_ENABLE_LOCAL_LOGINS: "true"
      DISCOURSE_ENABLE_LOCAL_LOGINS_VIA_EMAIL: "false"
    volumes:
      - discourse-data:/bitnami/discourse
    networks:
      - proxy
      - discourse_internal
    depends_on:
      - discourse-postgres
      - discourse-redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/srv/status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s  # Discourse asset precompilation takes ~5 min on first boot

  discourse-postgres:
    image: bitnami/postgresql:16
    restart: unless-stopped
    environment:
      POSTGRESQL_DATABASE: discourse
      POSTGRESQL_USERNAME: discourse
      POSTGRESQL_PASSWORD: ${DISCOURSE_DB_PASSWORD}
    volumes:
      - discourse-postgres-data:/bitnami/postgresql
    networks:
      - discourse_internal

  discourse-redis:
    image: bitnami/redis:7.4
    restart: unless-stopped
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - discourse-redis-data:/bitnami/redis/data
    networks:
      - discourse_internal
